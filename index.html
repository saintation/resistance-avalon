<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>레지스탕스 아발론: 온라인</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <style>
        :root {
            --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #e0e0e0;
            --accent: #bb86fc; --accent-hover: #985eff; --danger: #cf6679; --success: #03dac6;
        }
        body {
            font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); color: var(--text-main);
            text-align: center; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        .hidden { display: none !important; }
        .container {
            background-color: var(--card-bg); padding: 20px; width: 100%; max-width: 400px;
            margin-bottom: 20px; border-radius: 16px; border: 1px solid #333; box-sizing: border-box;
        }
        h1 { color: var(--accent); margin-bottom: 5px; font-weight: 800; font-size: 24px; }
        .version-text { font-size: 12px; color: #888; margin-bottom: 20px; display: block; }
        input, select, button { margin: 8px 0; padding: 14px; width: 100%; border-radius: 8px; border: none; box-sizing: border-box; font-size: 16px; }
        input, select { background-color: #2c2c2c; color: var(--text-main); border: 1px solid #444; }
        input:focus, select:focus { outline: 2px solid var(--accent); }
        button { cursor: pointer; font-weight: 600; }
        .btn-accent { background-color: var(--accent); color: #000; }
        .btn-ready { background-color: transparent; border: 2px solid var(--success); color: var(--success); }
        .btn-ready.is-ready { background-color: var(--success); color: #000; }
        .btn-danger { background-color: transparent; border: 2px solid var(--danger); color: var(--danger); }
        #playerList { list-style: none; padding: 0; margin: 20px 0; text-align: left; }
        .player-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background-color: rgba(255,255,255,0.05); margin-bottom: 8px; border-radius: 8px; }
        .status-badge { font-size: 12px; padding: 4px 8px; border-radius: 4px; background-color: #444; color: #aaa; }
        .status-badge.ready { background-color: var(--success); color: #000; }
        .status-badge.offline { background-color: transparent; color: var(--danger); border: 1px dashed var(--danger); }
        .player-item.offline-row { opacity: 0.5; }
        #startGameBtn { background-color: #ff9800; color: #000; }
        .role-summary-header { background-color: #2c2c2c; padding: 15px; border-radius: 8px; cursor: pointer; border: 1px solid #444; display: flex; justify-content: space-between; align-items: center; user-select: none; }
        .role-summary-content { background-color: #1a1a1a; padding: 20px; border-radius: 0 0 8px 8px; border: 1px solid #444; border-top: none; display: none; margin-bottom: 20px; }
        .role-summary-content.show { display: block; }
        .secret-box { border: 1px dashed var(--danger); padding: 15px; border-radius: 12px; background-color: rgba(207, 102, 121, 0.05); margin-top: 15px;}
        .checkbox-label { display: flex; align-items: center; padding: 10px; background: rgba(255,255,255,0.05); margin-bottom: 5px; border-radius: 6px; cursor: pointer; font-size: 14px;}
        .checkbox-label input { width: auto; margin-right: 10px; transform: scale(1.2); }
        .confirm-area { margin-top: 15px; padding: 15px; border: 1px solid #444; border-radius: 8px; background-color: rgba(255,255,255,0.02); }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <h1>레지스탕스 아발론</h1>
        <span class="version-text">v1.1.0</span>

        <div id="loginArea">
            <input type="text" id="nicknameInput" placeholder="닉네임 입력">
            <input type="text" id="roomCodeInput" placeholder="방 코드 (참여시)">
            <button id="joinRoomBtn" class="btn-accent">방 참여</button>
            <button id="createRoomBtn" style="background-color: #444; color: white;">새 방 만들기</button>
        </div>

        <div id="lobbyArea" class="hidden">
            <h3 id="roomTitleDisplay">로비</h3>
            <ul id="playerList"></ul>
            
            <div id="hostControls" class="hidden" style="margin-bottom: 20px; text-align: left;">
                <label class="checkbox-label"><input type="checkbox" id="cbMorgana" checked> 모르가나 (악)</label>
                <label class="checkbox-label"><input type="checkbox" id="cbMordred" checked> 모드레드 (악)</label>
                <label class="checkbox-label"><input type="checkbox" id="cbOberon"> 오베론 (악)</label>
                <label class="checkbox-label"><input type="checkbox" id="cbPercival" checked> 퍼시발 (선)</label>
                <button id="startGameBtn">게임 시작</button>
            </div>

            <button id="readyBtn" class="btn-ready">준비하기</button>
            <button id="btnRestartGame" class="btn-danger hidden" style="margin-top:10px;">게임 강제 초기화</button>
            <button id="leaveRoomBtn" class="btn-danger" style="margin-top:10px;">방 나가기</button>
        </div>

        <p id="statusText" style="color: var(--accent); margin-top: 20px; font-weight: bold;"></p>

        <div id="gamePlayArea" class="hidden">
            <div id="roleSummaryHeader" class="role-summary-header hidden">내 직업 확인하기 <span>▼</span></div>
            <div id="roleSummaryContent" class="role-summary-content"></div>

            <div id="voteResultArea" class="hidden">
                <h3 id="voteResultMessage">투표 결과</h3>
                <ul id="voteResultList" style="list-style: none; padding: 0;"></ul>
                <div id="teamVoteConfirmArea" class="confirm-area"></div>
            </div>

            <div id="questVotingArea" class="hidden">
                <h3>원정대 임무 수행</h3>
                <button id="btnQuestSuccess" class="btn-accent">임무 성공</button>
                <button id="btnQuestFail" class="btn-danger hidden">임무 실패 (악 전용)</button>
            </div>

            <div id="questResultArea" class="hidden">
                <h3 id="questResultMessage">원정 결과</h3>
                <p id="questResultSummary" style="font-size: 18px; font-weight: bold;"></p>
                <div id="questConfirmArea" class="confirm-area"></div>
            </div>
        </div>
    </div>

    <div id="passwordModal" class="container hidden" style="position: absolute; top: 20%; z-index: 100;">
        <h3>방 관리자 비밀번호 설정</h3>
        <input type="password" id="adminPasswordInput" placeholder="비밀번호">
        <button id="confirmCreateBtn" class="btn-accent">생성 확인</button>
        <button id="cancelCreateBtn" class="btn-danger">취소</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, update, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        /* Firebase 설정 (기존 프로젝트 설정값으로 교체 필요) */
        const firebaseConfig = {
            // apiKey: "YOUR_API_KEY",
            // authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            // databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            // projectId: "YOUR_PROJECT_ID"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myUserId = "";
        let currentRoomId = "";
        let isHost = false;
        let globalPlayersData = {};
        window.isProcessingPhaseTransition = false; // 중복 콜백 방지용 락

        // DOM 요소 캐싱
        const passwordModal = document.getElementById('passwordModal');
        const adminPasswordInput = document.getElementById('adminPasswordInput');
        const statusText = document.getElementById('statusText');

        // 직업 확인 UI 토글
        document.getElementById('roleSummaryHeader').addEventListener('click', () => {
            document.getElementById('roleSummaryContent').classList.toggle('show');
        });

        // 1. 방 생성 시 고유 난수 검증 및 생성 로직
        document.getElementById('createRoomBtn').addEventListener('click', () => {
            const nickname = document.getElementById('nicknameInput').value.trim();
            if (!nickname) return alert("닉네임을 먼저 입력해 주세요.");
            adminPasswordInput.value = '';
            passwordModal.classList.remove('hidden');
            adminPasswordInput.focus();
        });

        document.getElementById('cancelCreateBtn').addEventListener('click', () => {
            passwordModal.classList.add('hidden');
        });

        document.getElementById('confirmCreateBtn').addEventListener('click', async () => {
            const nickname = document.getElementById('nicknameInput').value.trim();
            const adminKey = adminPasswordInput.value;
            if (!adminKey) return alert("비밀번호를 입력하세요.");

            let roomId;
            let isUnique = false;
            
            try {
                // 방 코드가 겹치지 않을 때까지 반복 확인
                while (!isUnique) {
                    roomId = Math.floor(1000 + Math.random() * 9000).toString();
                    const snapshot = await get(ref(db, `rooms/${roomId}`));
                    if (!snapshot.exists()) isUnique = true;
                }

                await set(ref(db, `rooms/${roomId}`), {
                    createdAt: Date.now(),
                    gameState: "lobby",
                    adminKey: adminKey
                });
                
                passwordModal.classList.add('hidden');
                joinRoomLogic(roomId, nickname);
            } catch (err) {
                console.error(err);
                alert("방 생성 중 오류가 발생했습니다.");
            }
        });

        // 2. 방 참여 및 닉네임 기반 세션 복구 로직 (좀비 세션 방지)
        document.getElementById('joinRoomBtn').addEventListener('click', () => {
            const nickname = document.getElementById('nicknameInput').value.trim();
            const roomId = document.getElementById('roomCodeInput').value.trim();
            if (!nickname || !roomId) return alert("닉네임과 방 코드를 모두 입력하세요.");
            
            get(ref(db, `rooms/${roomId}`)).then((snapshot) => {
                if (snapshot.exists()) {
                    // 이미 게임이 시작되었으나, 기존에 참여했던 유저라면(ID 존재) 재접속 허용
                    const cleanNickname = nickname.replace(/[.#$\[\]\s]/g, "");
                    const isExistingUser = snapshot.val().players && snapshot.val().players[cleanNickname];
                    
                    if (snapshot.val().gameState === "lobby" || isExistingUser) {
                        joinRoomLogic(roomId, nickname);
                    } else {
                        alert("이미 진행 중인 게임이거나 존재하지 않는 방입니다.");
                    }
                } else {
                    alert("존재하지 않는 방입니다.");
                }
            });
        });

        function joinRoomLogic(roomId, nickname) {
            // Firebase key 제약을 우회하기 위해 닉네임에서 특수문자 제거 후 고유 ID로 사용
            const cleanNickname = nickname.replace(/[.#$\[\]\s]/g, "");
            myUserId = cleanNickname || ("user_" + Math.floor(Math.random() * 10000)); 
            currentRoomId = roomId;

            const playerRef = ref(db, `rooms/${roomId}/players/${myUserId}`);
            
            // 연결 끊김 시 isOnline을 false로 자동 변경 (좀비 방지 보조)
            onDisconnect(playerRef).update({ isOnline: false });

            // 플레이어 정보 덮어쓰기 (또는 기존 데이터 업데이트)
            update(playerRef, {
                nickname: nickname,
                isOnline: true
            }).then(() => {
                // 기존에 역할이 없었다면 pending 처리 (새로 들어온 경우)
                get(playerRef).then(snap => {
                    if(!snap.val().role) {
                        update(playerRef, { isReady: false, role: "pending" });
                    }
                });
                
                localStorage.setItem('avalon_session', JSON.stringify({ roomId, userId: myUserId, nickname }));
                document.getElementById('loginArea').classList.add('hidden');
                startRealtimeSync(roomId, nickname);
            });
        }

        // --- 공통 결과 확인 UI 렌더링 함수 ---
        function renderConfirmationUI(containerId, playData, totalPlayers, hostActionCallback) {
            const container = document.getElementById(containerId);
            const confirmations = playData.confirmations || {};
            const confirmedCount = Object.keys(confirmations).length;
            
            const unconfirmedPlayers = Object.keys(globalPlayersData)
                .filter(id => !confirmations[id])
                .map(id => globalPlayersData[id].nickname);
            
            let html = ``;
            if (confirmations[myUserId]) {
                html += `<p style="font-size: 14px; color: var(--accent);">다른 플레이어 대기 중... (${confirmedCount}/${totalPlayers})</p>`;
                if (unconfirmedPlayers.length > 0) {
                    html += `<p style="color: var(--danger); font-size: 12px; margin-top: 5px;">미확인: ${unconfirmedPlayers.join(', ')}</p>`;
                }
            } else {
                html += `<button id="btnConfirm_${containerId}" class="btn-accent" style="width: 100%;">결과 확인 완료</button>`;
                if (unconfirmedPlayers.length > 0) {
                    html += `<p style="color: var(--danger); font-size: 12px; margin-top: 10px;">미확인: ${unconfirmedPlayers.join(', ')}</p>`;
                }
            }
            container.innerHTML = html;

            const btn = document.getElementById(`btnConfirm_${containerId}`);
            if (btn) {
                btn.onclick = () => {
                    update(ref(db, `rooms/${currentRoomId}/playData/confirmations`), { [myUserId]: true });
                };
            }

            // 모든 인원이 확인했고, 내가 방장일 때만 콜백 실행
            if (isHost && confirmedCount === totalPlayers && !window.isProcessingPhaseTransition) {
                window.isProcessingPhaseTransition = true; // 중복 방지 락 체결
                hostActionCallback();
                setTimeout(() => { window.isProcessingPhaseTransition = false; }, 2000); // 2초 후 락 해제
            }
        }

        // 상태 동기화 메인 루프
        function startRealtimeSync(roomId, myNickname) {
            const roomRef = ref(db, `rooms/${roomId}`);
            onValue(roomRef, (snapshot) => {
                if (!snapshot.exists()) {
                    alert("방이 파기되었습니다.");
                    location.reload();
                    return;
                }

                const data = snapshot.val();
                globalPlayersData = data.players || {};
                const currentGameState = data.gameState;
                const playData = data.playData || {};
                const totalPlayers = Object.keys(globalPlayersData).length;

                // 호스트 판별 (편의상 첫 번째 접속자로 지정)
                const playerIds = Object.keys(globalPlayersData);
                isHost = (playerIds[0] === myUserId);
                
                document.getElementById('roomTitleDisplay').innerText = `방 번호: ${roomId} ${isHost ? '(방장)' : ''}`;
                if (isHost) {
                    document.getElementById('hostControls').classList.remove('hidden');
                    document.getElementById('btnRestartGame').classList.remove('hidden');
                } else {
                    document.getElementById('hostControls').classList.add('hidden');
                    document.getElementById('btnRestartGame').classList.add('hidden');
                }

                // 3. 게임 재시작 시 이전 역할 데이터 초기화 (멀린 버그 해결)
                if (currentGameState === "lobby") {
                    document.getElementById('lobbyArea').classList.remove('hidden');
                    document.getElementById('gamePlayArea').classList.add('hidden');
                    document.getElementById('roleSummaryHeader').classList.add('hidden');
                    statusText.innerText = "플레이어 대기 중...";
                    
                    // 핵심 수정: 이전 판의 직업 UI와 잔재를 DOM에서 강제 삭제
                    document.getElementById('roleSummaryContent').innerHTML = '';
                    document.querySelectorAll('.secret-box').forEach(box => box.remove());
                    
                    // 플레이어 목록 렌더링
                    const playerList = document.getElementById('playerList');
                    playerList.innerHTML = '';
                    let readyCount = 0;
                    
                    Object.entries(globalPlayersData).forEach(([id, pData]) => {
                        const isMe = (id === myUserId);
                        const readyText = pData.isReady ? `<span class="status-badge ready">준비완료</span>` : `<span class="status-badge">대기중</span>`;
                        const offlineText = pData.isOnline ? '' : `<span class="status-badge offline">오프라인</span>`;
                        if (pData.isReady) readyCount++;
                        
                        playerList.innerHTML += `
                            <li class="player-item ${!pData.isOnline ? 'offline-row' : ''}">
                                <span>${pData.nickname} ${isMe ? '(나)' : ''}</span>
                                <div>${offlineText} ${readyText}</div>
                            </li>`;
                    });

                    const myData = globalPlayersData[myUserId] || {};
                    const readyBtn = document.getElementById('readyBtn');
                    if (myData.isReady) {
                        readyBtn.innerText = "준비 취소";
                        readyBtn.classList.add('is-ready');
                    } else {
                        readyBtn.innerText = "준비하기";
                        readyBtn.classList.remove('is-ready');
                    }

                    if (isHost) {
                        const startBtn = document.getElementById('startGameBtn');
                        startBtn.disabled = (readyCount !== totalPlayers || totalPlayers < 5);
                        startBtn.style.opacity = startBtn.disabled ? 0.5 : 1;
                    }
                } 
                else {
                    // 게임 진행 중
                    document.getElementById('lobbyArea').classList.add('hidden');
                    document.getElementById('gamePlayArea').classList.remove('hidden');
                    
                    // 역할 부여 처리 (한 번만 렌더링되도록 처리)
                    const myRole = globalPlayersData[myUserId]?.role;
                    const roleContentEl = document.getElementById('roleSummaryContent');
                    if (myRole && myRole !== "pending" && roleContentEl.innerHTML === '') {
                        document.getElementById('roleSummaryHeader').classList.remove('hidden');
                        roleContentEl.innerHTML = `<h4>당신의 역할은 <span style="color:var(--accent)">${myRole}</span> 입니다.</h4>`;
                        // (이후 특정 역할에 맞는 시야(secret-box)를 렌더링하는 기존 로직이 이곳에 추가됨)
                    }

                    // 모든 영역 숨김 처리 후 상태에 맞게 노출
                    document.getElementById('voteResultArea').classList.add('hidden');
                    document.getElementById('questVotingArea').classList.add('hidden');
                    document.getElementById('questResultArea').classList.add('hidden');

                    if (currentGameState === "team_voting_result") {
                        // 4-1. 원정대 투표 결과 및 수동 확인 시스템
                        document.getElementById('voteResultArea').classList.remove('hidden');
                        const votes = playData.teamVotes || {};
                        const voteResultList = document.getElementById('voteResultList');
                        voteResultList.innerHTML = '';
                        let approveCount = 0;
                        
                        Object.entries(votes).forEach(([id, v]) => {
                            if (v === 'approve') approveCount++;
                            const pName = globalPlayersData[id] ? globalPlayersData[id].nickname : '알 수 없음';
                            voteResultList.innerHTML += `<li>${pName}: ${v === 'approve' ? '🟢 찬성' : '🔴 반대'}</li>`;
                        });
                        
                        const isApproved = approveCount > (totalPlayers / 2);
                        const resultMsgEl = document.getElementById('voteResultMessage');
                        resultMsgEl.innerText = isApproved ? "원정대가 가결되었습니다!" : "원정대가 부결되었습니다.";
                        resultMsgEl.style.color = isApproved ? "var(--success)" : "var(--danger)";

                        statusText.innerText = "투표 결과를 확인해 주세요.";
                        
                        renderConfirmationUI('teamVoteConfirmArea', playData, totalPlayers, () => {
                            const updates = {};
                            if (isApproved) {
                                updates[`rooms/${currentRoomId}/gameState`] = "quest_voting";
                                updates[`rooms/${currentRoomId}/playData/voteTrack`] = 0;
                                updates[`rooms/${currentRoomId}/playData/questVotes`] = null;
                            } else {
                                const newTrack = (playData.voteTrack || 0) + 1;
                                if (newTrack >= 5) {
                                    updates[`rooms/${currentRoomId}/gameState`] = "game_over";
                                    updates[`rooms/${currentRoomId}/playData/voteTrack`] = newTrack;
                                } else {
                                    updates[`rooms/${currentRoomId}/gameState`] = "team_building";
                                    updates[`rooms/${currentRoomId}/playData/leaderIndex`] = (playData.leaderIndex + 1) % totalPlayers;
                                    updates[`rooms/${currentRoomId}/playData/voteTrack`] = newTrack;
                                }
                            }
                            updates[`rooms/${currentRoomId}/playData/teamVotes`] = null;
                            updates[`rooms/${currentRoomId}/playData/confirmations`] = null; // 확인 데이터 초기화
                            update(ref(db), updates);
                        });

                    } else if (currentGameState === "quest_voting") {
                        const isParticipant = (playData.selectedTeam || []).includes(myUserId);
                        if (isParticipant) {
                            document.getElementById('questVotingArea').classList.remove('hidden');
                            // (기존 찬반 투표 버튼 활성화/비활성화 로직 유지)
                        } else {
                            statusText.innerText = "선택된 원정대원들이 임무를 수행 중입니다.";
                        }
                        
                        const qVotes = playData.questVotes || {};
                        const requiredSize = playData.selectedTeam ? playData.selectedTeam.length : 0;
                        
                        // 호스트: 임무 투표 완료 시 타임아웃 없이 결과 상태로 전환
                        if (isHost && Object.keys(qVotes).length === requiredSize && !window.isProcessingPhaseTransition) {
                            window.isProcessingPhaseTransition = true;
                            
                            let successCount = 0;
                            let failCount = 0;
                            Object.values(qVotes).forEach(v => { if (v === 'fail') failCount++; else successCount++; });
                            
                            const currentQuestIndex = playData.currentQuest || 0;
                            const isQuestFailed = (totalPlayers >= 7 && currentQuestIndex === 3) ? (failCount >= 2) : (failCount >= 1);
                            
                            const currentResults = playData.questResults || [];
                            currentResults[currentQuestIndex] = isQuestFailed ? 'fail' : 'success';
                            
                            update(ref(db), {
                                [`rooms/${currentRoomId}/playData/questResults`]: currentResults,
                                [`rooms/${currentRoomId}/gameState`]: "quest_result"
                            }).then(() => {
                                setTimeout(() => { window.isProcessingPhaseTransition = false; }, 2000);
                            });
                        }

                    } else if (currentGameState === "quest_result") {
                        // 4-2. 원정 결과 및 수동 확인 시스템
                        document.getElementById('questResultArea').classList.remove('hidden');
                        const currentQuestIndex = playData.currentQuest || 0;
                        const questResults = playData.questResults || [];
                        const isFailed = (questResults[currentQuestIndex] === 'fail');
                        
                        const msgEl = document.getElementById('questResultMessage');
                        msgEl.innerText = isFailed ? "원정 실패..." : "원정 성공!";
                        msgEl.style.color = isFailed ? "var(--danger)" : "var(--success)";
                        
                        statusText.innerText = "원정 결과를 확인해 주세요.";

                        renderConfirmationUI('questConfirmArea', playData, totalPlayers, () => {
                            let successCount = questResults.filter(r => r === 'success').length;
                            let failCount = questResults.filter(r => r === 'fail').length;
                            const updates = {};
                            
                            if (successCount >= 3) {
                                updates[`rooms/${currentRoomId}/gameState`] = "assassin_phase";
                            } else if (failCount >= 3) {
                                updates[`rooms/${currentRoomId}/gameState`] = "game_over";
                            } else {
                                updates[`rooms/${currentRoomId}/gameState`] = "team_building";
                                updates[`rooms/${currentRoomId}/playData/currentQuest`] = (playData.currentQuest || 0) + 1;
                                updates[`rooms/${currentRoomId}/playData/leaderIndex`] = (playData.leaderIndex + 1) % totalPlayers;
                                updates[`rooms/${currentRoomId}/playData/voteTrack`] = 0;
                                updates[`rooms/${currentRoomId}/playData/questVotes`] = null;
                                updates[`rooms/${currentRoomId}/playData/selectedTeam`] = null;
                            }
                            updates[`rooms/${currentRoomId}/playData/confirmations`] = null; // 확인 데이터 초기화
                            update(ref(db), updates);
                        });
                    }
                    // 추가적으로 team_building, assassin_phase, game_over 상태에 대한 처리를 이곳에 작성합니다.
                }
            });
        }

        // 게임 준비 로직 등 기타 버튼 이벤트
        document.getElementById('readyBtn').addEventListener('click', () => {
            get(ref(db, `rooms/${currentRoomId}/players/${myUserId}`)).then((snapshot) => {
                update(ref(db, `rooms/${currentRoomId}/players/${myUserId}`), { isReady: !snapshot.val().isReady });
            });
        });

        document.getElementById('leaveRoomBtn').addEventListener('click', () => {
            if (confirm("방을 완전히 나가시겠습니까?")) {
                update(ref(db, `rooms/${currentRoomId}/players/${myUserId}`), { isOnline: false }).then(() => {
                    localStorage.removeItem('avalon_session');
                    location.reload();
                });
            }
        });
        
        // 이전 세션이 로컬 스토리지에 남아있다면 자동 복구 시도
        window.onload = () => {
            const savedSession = localStorage.getItem('avalon_session');
            if (savedSession) {
                const { roomId, nickname } = JSON.parse(savedSession);
                document.getElementById('nicknameInput').value = nickname;
                document.getElementById('roomCodeInput').value = roomId;
            }
        };
    </script>
</body>
</html>
